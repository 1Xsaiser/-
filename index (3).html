<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .page {
            display: none;
        }

        .page.show {
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <hav>
            <button data-group=".page" data-target="page-1">  Страница 1 </button> 
            <button data-group=".page" data-target="page-2">  Страница 2 </button>
            <button data-group=".page" data-target="page-3">  Страница 3 </button>
            </hav>
            </header>
            <main>
                <div class="page show" id="page-1"> меня зовут данил я из города ставрополь хочу обучится python </div>
<div class="page" id="page-2"> 
    <input type="text" id="textInput" placeholder="Enter text...">
    <button id="submitBtn">ввести</button>
    <div id="outputLine"></div>
</div>
                <div class="page" id="page-3">
                 я люблю играть в компьютерные игры в свободное время
                </div>
            </main>
<script>
    document.querySelectorAll('button[data-group]').forEach(button =>{
        button.onclick = event => {
            document.querySelectorAll(button.dataset.group).forEach(function (element){
                element.classList.toggle('show', element.id === event.currentTarget.dataset.target);
            })
        }
    })
</script>
<script>
    const input = document.getElementById('textInput');
    const button = document.getElementById('submitBtn');
    const outputLine = document.getElementById('outputLine');
    let values = [];

    function handleSubmit() {
        const text = input.value.trim();
        
        if (text !== '') {

            values.unshift(text);
            

            if (values.length > 10) {
                values.pop();
            }
            

            displayValues();
            

            input.value = '';
        } else {
            outputLine.innerHTML = '<div style="color: red;">Please enter some text</div>';
            setTimeout(() => {
                displayValues();
            }, 1500);
        }
    }
    
    function displayValues() {
        if (values.length === 0) {
            outputLine.innerHTML = '<div style="color: #999;">No values yet</div>';
        } else {
            let html = '';
            values.forEach((value, index) => {
                html += `<div style="padding: 5px; margin: 2px 0; background-color: #f0f0f0; border-radius: 3px;">
                            ${index + 1}. ${value}
                         </div>`;
            });
            outputLine.innerHTML = html;
        }
    }
    
    input.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault(); 
            handleSubmit();
        }
    });
    
    button.addEventListener('click', handleSubmit);
</script>
